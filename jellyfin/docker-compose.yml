services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: crow-jellyfin
    ports:
      - "127.0.0.1:8096:8096"
    volumes:
      - ${JELLYFIN_CONFIG_PATH:-jellyfin-config}:/config
      - ${JELLYFIN_MEDIA_PATH:?Set JELLYFIN_MEDIA_PATH}:/media
      - jellyfin-cache:/cache
    environment:
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL:-http://localhost:8096}
    init: true
    mem_limit: 2g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  jellyfin-config:
  jellyfin-cache:
