services:
  vllm-cuda-embed:
    image: ${VLLM_CUDA_IMAGE}
    container_name: vllm-cuda-embed
    runtime: nvidia
    env_file:
      - ${HOME}/.crow/env/cuda.env
    environment:
      HF_HOME: /models
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - ${GRACKLE_HF_CACHE}:/models
    ports:
      - "${GRACKLE_TAILSCALE_IP}:9100:8000"
    # vLLM embedding task — OpenAI-compatible /v1/embeddings
    command:
      - --model=Qwen/Qwen3-Embedding-0.6B
      - --served-model-name=qwen3-embedding-0.6b
      - --task=embed
      - --host=0.0.0.0
      - --port=8000
      - --dtype=bfloat16
      - --gpu-memory-utilization=0.20
      - --max-model-len=8192
      - --max-num-seqs=32
    restart: unless-stopped
    ipc: host
    shm_size: 2g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
