services:
  vllm-rocm-qwen3:
    image: ${VLLM_ROCM_IMAGE}
    container_name: vllm-rocm-qwen3
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "${VIDEO_GID}"
      - "${RENDER_GID}"
    env_file:
      - ${HOME}/.crow/env/rocm.env
    environment:
      HF_HOME: /models
      HUGGING_FACE_HUB_TOKEN: ${VLLM_HF_TOKEN:-}
    volumes:
      - ${LLM_CACHE}:/models
    ports:
      - "${CROW_TAILSCALE_IP}:8001:8000"
    entrypoint: ["vllm", "serve"]
    command:
      - Qwen/Qwen3-4B
      - --served-model-name
      - qwen3-4b
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --dtype
      - bfloat16
      - --gpu-memory-utilization
      - "0.12"
      - --max-model-len
      - "32768"
      - --max-num-seqs
      - "16"
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
      - --enforce-eager
    restart: unless-stopped
    ipc: host
    shm_size: 8g
