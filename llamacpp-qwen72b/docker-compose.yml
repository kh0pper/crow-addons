services:
  llamacpp-qwen72b:
    image: kyuz0/amd-strix-halo-toolboxes:rocm-7.2.1
    container_name: llamacpp-qwen72b
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - "${VIDEO_GID}"
      - "${RENDER_GID}"
    env_file:
      - ${HOME}/.crow/env/rocm.env
    volumes:
      - ${LLM_CACHE}:/models:ro
    ports:
      - "${CROW_TAILSCALE_IP}:8003:8000"
    entrypoint: ["llama-server"]
    command:
      - -m
      - /models/qwen2.5-72b/Qwen2.5-72B-Instruct-Q4_K_M.gguf
      - --alias
      - qwen2.5-72b
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - -ngl
      - "999"
      - -fa
      - "1"
      - --no-mmap
      - -c
      - "65536"
      - --jinja
    restart: "no"
    ipc: host
    shm_size: 16g
