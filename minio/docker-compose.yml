## MinIO — S3-Compatible Object Storage for Crow
##
## Provides file storage for Crow's storage server.
## After install, the gateway's storage server auto-connects to MinIO.
##
## Console (admin UI): http://localhost:9001
## API endpoint: http://localhost:9000 (used by Crow internally)

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-crowadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme-crow-storage}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9000:9000"   # API — internal only
      - "0.0.0.0:9001:9001"     # Console — accessible via Tailscale (firewall-controlled)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  minio-data:
