# Crow coturn TURN server configuration
# Credentials are passed via command line (--static-auth-secret, --realm)

# Listening
listening-port=3478
tls-listening-port=5349

# TURN REST API (time-limited credentials via HMAC shared secret)
use-auth-secret

# Relay port range (narrow for household use, avoids collisions)
min-port=49152
max-port=49252

# Security
no-cli
no-multicast-peers
no-loopback-peers
stale-nonce=600

# Logging
log-file=stdout
verbose

# Fingerprint for STUN messages
fingerprint
